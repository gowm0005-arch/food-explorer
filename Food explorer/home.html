<!DOCTYPE html>
<html>

<head>

    <title>Food Explorer</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: #ff5722;
            color: white;
            padding: 15px;
            font-size: 22px;
            text-align: center;
        }

        .container {
            width: 500px;
            margin: auto;
        }

        .upload-box {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            background: #ff5722;
            color: white;
            border: none;
            cursor: pointer;
        }

        .post {
            background: white;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .post img {
            width: 100%;
        }

        .post-content {
            padding: 10px;
        }

        .post-actions {
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <header>
        🍔 Food Explorer
    </header>

    <div class="container">

        <div class="upload-box">

            <h3>Share Your Food</h3>

            <input id="foodName" placeholder="Food Name">

            <input id="imageUrl" placeholder="Image URL">

            <textarea id="review" placeholder="Write review"></textarea>

            <button onclick="addPost()">Post</button>

        </div>

        <div id="posts"></div>

    </div>


    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getFirestore,
            collection,
            addDoc,
            getDocs,
            doc,
            updateDoc,
            increment
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


        const firebaseConfig = {

            apiKey: "AIzaSyAqMWOE_uR6AUX9u-g9QybNPeLE8B361aM",
            authDomain: "food-explorer-fc408.firebaseapp.com",
            projectId: "food-explorer-fc408",
            storageBucket: "food-explorer-fc408.appspot.com",
            messagingSenderId: "247217642461",
            appId: "1:247217642461:web:000b3cd0d31c8...",
            measurementId: "G-Q6ZBFHQHBW"

        };


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        window.addPost = async function () {

            const food = document.getElementById("foodName").value;
            const image = document.getElementById("imageUrl").value;
            const review = document.getElementById("review").value;

            await addDoc(collection(db, "posts"), {

                food: food,
                image: image,
                review: review,
                likes: 0

            });

            alert("Post Added");

            loadPosts();

        }


        async function loadPosts() {

            const querySnapshot = await getDocs(collection(db, "posts"));

            const postDiv = document.getElementById("posts");

            postDiv.innerHTML = "";

            querySnapshot.forEach((docSnap) => {

                const data = docSnap.data();

                postDiv.innerHTML += `

<div class="post">

<img src="${data.image}">

<div class="post-content">

<h3>${data.food}</h3>

<p>${data.review}</p>

<div class="post-actions">

<button onclick="likePost('${docSnap.id}')">

❤️ Like (${data.likes || 0})

</button>

</div>

</div>

</div>

`;

            });

        }


        window.likePost = async function (postId) {

            const postRef = doc(db, "posts", postId);

            await updateDoc(postRef, {

                likes: increment(1)

            });

            loadPosts();

        }


        loadPosts();

    </script>

</body>

</html>
